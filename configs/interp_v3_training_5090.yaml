# LayeredInterpolator v2 Training Configuration
# ============================================
# v2 architecture: occlusion-aware BG, full-res FG (K=5 bicubic), deeper refinement
# RTX 5090 (32GB VRAM)

# Model Architecture
model_version: "v3"
base_channels: 96        # Maximum capacity for 32GB VRAM
kernel_size: 5           # v2: K=5 with bicubic sampling (was K=9 bilinear)
grid_size: 8             # Background affine grid size
use_refinement: true     # Use refinement U-Net in compositor

# Discriminator
disc_channels: 64        # Base discriminator channels

# Training
epochs: 300              # IFRNet trains 300 epochs on Vimeo-90K
batch_size: 12           # Benchmark=20.3GB + ~5GB real overhead = ~25GB (safe for 31.5GB)
num_workers: 12          # High parallelism for fast data loading
crop_size: [256, 256]    # IFRNet uses 224; 256 is a good balance
prefetch_factor: 4       # Prefetch batches per worker
persistent_workers: true # Keep workers alive between epochs
# max_samples: not set — use full ATD-12K (10K triplets)

# Learning rates (IFRNet: 1e-4 → 1e-5 cosine)
lr_g: 0.000107            # Sweep winner: ~1.07e-4
lr_d: 0.00002            # Much slower D to prevent domination
weight_decay: 0.001      # Sweep winner (was 0.01)

# Gradient clipping
grad_clip: 1.0           # Clip gradients to prevent explosion

# Loss weights (RIFE/IFRNet-inspired recipe + frequency loss)
l1_weight: 1.0           # Charbonnier loss (differentiable at zero)
census_weight: 2.0       # Sweep winner: doubled census = better structure
perceptual_weight: 0.0   # DISABLED for Phase 1 (VGG hurts PSNR convergence)
edge_weight: 0.5         # Edge-weighted L1
edge_multiplier: 10.0    # Edge pixel weight
freq_weight: 0.0         # Sweep result: no benefit from Laplacian loss
gan_weight: 0.005        # Lower GAN weight for Phase 2 fine-tuning

# GAN configuration — R3GAN-inspired (arXiv 2501.05441)
gan_start_epoch: 200     # Phase 1: reconstruct for 200 epochs, then GAN
gan_type: relativistic   # RpGAN loss
r1_gamma: 10.0           # R1 gradient penalty on real data
r2_gamma: 10.0           # R2 gradient penalty on fake data
lr_g_phase2: 0.00003     # Lower lr_g when GAN activates

# Phase 2 VRAM management (benchmarked: bs=12 → 28.6GB peak)
phase2_batch_size: 10    # Benchmark=17GB + ~5GB overhead = ~22GB (GAN needs extra headroom)
gradient_accumulation_steps: 1  # No accumulation needed at batch=12

# Mixed precision
use_amp: true
amp_dtype: bfloat16      # BFloat16 = wider range than FP16
cudnn_benchmark: true    # Enable cuDNN auto-tuner

# Logging and checkpointing
log_dir: runs
checkpoint_dir: checkpoints
save_every: 5            # Save checkpoint every 5 epochs (300 epochs = 60 checkpoints)
save_every_batches: 5000 # Mid-epoch backup saves

# Data — ATD-12K curated anime dataset
data_dir: training_data\train_10k

# Curriculum learning — DISABLED for ATD-12K (already curated)
# curriculum:
#   - {epoch: 0,  min_motion: 0.01, max_motion: 0.04}
#   - {epoch: 10, min_motion: 0.01, max_motion: 0.08}
#   - {epoch: 25, min_motion: 0.005, max_motion: 0.15}

